name: Publish

# This workflow lives inside the `frontend/user` component repository, so the repository root
# here is the user portal sources and the build output is `dist/`.
#
# On every push to `main` it builds the user portal and publishes a *pre-release*.
# To avoid flooding the releases page, only ONE pre-release is produced per calendar day:
# the tag `pre-YYYY-MM-DD` is reused, so every push within the same day updates the same
# pre-release (latest commit wins).
#
# Pushing a tag starting with `v` (e.g. `v1.2.3`) publishes a *formal release* instead.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Serialize runs so concurrent pushes don't race when creating/updating the
# daily pre-release.
concurrency:
  group: publish-user-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.vars.outputs.date }}
      tag: ${{ steps.vars.outputs.tag }}
      is_prerelease: ${{ steps.vars.outputs.is_prerelease }}
      release_name: ${{ steps.vars.outputs.release_name }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Formal release: use the pushed tag (e.g. v1.2.3) verbatim.
            TAG="${GITHUB_REF#refs/tags/}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # Pre-release (push to main / manual dispatch): daily tag.
            TAG="pre-$(date -u +%Y-%m-%d)"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Pre-release $(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package artifact
        run: |
          tar -czf dist.tar.gz -C dist .
          (cd dist && zip -r ../dist.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: user-dist
          path: |
            dist.tar.gz
            dist.zip
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      # Only one pre-release per day: remove any existing daily pre-release
      # (and its tag) so the next step recreates it from the latest commit.
      # Skipped for formal `v*` releases — those must never be deleted/overwritten.
      - name: Remove existing daily pre-release if present
        if: needs.prepare.outputs.is_prerelease == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" -y --cleanup-tag
          fi

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          path: out
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            out/dist.tar.gz
            out/dist.zip
