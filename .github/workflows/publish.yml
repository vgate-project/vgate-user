name: Publish

# This workflow lives inside the `frontend/user` component repository, so the repository root
# here is the user portal sources and the build output is `dist/`.
#
# On push to `main` it builds the user portal, publishes a non-prerelease
# GitHub *release* tagged `dev-<short-sha>`, and uploads the build artifacts to
# that release. The Docker image is also tagged `dev-<short-sha>`.
#
# Pushing a tag starting with `v` (e.g. `v1.2.3`) publishes a *formal release* instead.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Serialize runs so concurrent pushes don't race.
concurrency:
  group: publish-user-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.vars.outputs.date }}
      tag: ${{ steps.vars.outputs.tag }}
      is_prerelease: ${{ steps.vars.outputs.is_prerelease }}
      release_name: ${{ steps.vars.outputs.release_name }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Formal release: use the pushed tag (e.g. v1.2.3) verbatim.
            TAG="${GITHUB_REF#refs/tags/}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # Push to main / manual dispatch: publish a non-prerelease GitHub
            # release tagged dev-<short-sha> (unique per commit, so no reuse
            # or force-move needed).
            TAG="dev-${GITHUB_SHA::7}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package artifact
        run: |
          tar -czf dist.tar.gz -C dist .
          (cd dist && zip -r ../dist.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: user-dist
          path: |
            dist.tar.gz
            dist.zip
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          path: out
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            out/dist.tar.gz
            out/dist.zip
